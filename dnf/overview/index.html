<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="portal-base" content="../../" />
    <title>DNF Overview · Apnea Signal</title>
    <link rel="stylesheet" href="../../assets/css/site.css" />
  </head>
  <body class="overview-page">
    <header class="page-header">
      <div class="container">
        <div class="brand-row">
          <div class="overview-header-left">
            <a class="brand-title" href="../../">Apnea Signal</a>
          </div>
          <h1 class="overview-header-title">DNF Overview</h1>
          <div class="header-controls" aria-label="Overview controls">
            <div class="header-control header-control-inline">
              <select id="categorySelect" aria-label="Category"></select>
              <span class="header-inline-label">Category</span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="overview-layout">
        <section class="card speed-profile-section">
          <h2>Speed Profile: Top Athletes</h2>
          <p id="overviewStatus" class="note">Loading analysis charts...</p>
          <div id="speedProfileSections" class="speed-profile-grid"></div>
        </section>

        <aside class="card athlete-sidebar">
          <div class="sidebar-head">
            <h2>Athlete Controls</h2>
            <button
              id="sidebarToggleButton"
              type="button"
              class="sidebar-toggle-button"
              aria-expanded="true"
              aria-label="Collapse athlete controls panel"
              title="Fold/unfold panel"
            >
              <span class="sidebar-toggle-icon" aria-hidden="true">&lt;</span>
              <span class="sidebar-toggle-text">Fold</span>
            </button>
          </div>
          <div id="sidebarResizeHandle" class="sidebar-resize-handle" aria-hidden="true"></div>
          <div id="athleteSidebarBody" class="athlete-sidebar-body">
            <div class="sidebar-controls">
              <div class="control">
                <label for="topEventChecklist">Top Events</label>
                <div id="topEventChecklist" class="event-filter-checklist"></div>
              </div>
              <div class="control">
                <label for="trainingEventChecklist">Training Events</label>
                <div id="trainingEventChecklist" class="event-filter-checklist"></div>
              </div>
              <div class="control">
                <label for="sortSelect">Sort</label>
                <select id="sortSelect">
                  <option value="performance_desc">Performance (High to Low)</option>
                  <option value="performance_asc">Performance (Low to High)</option>
                  <option value="name_asc">Athlete Name (A-Z)</option>
                  <option value="name_desc">Athlete Name (Z-A)</option>
                </select>
              </div>
              <div class="control">
                <label for="athleteSearchInput">Search Athlete</label>
                <input id="athleteSearchInput" type="search" placeholder="Type a name..." />
              </div>
            </div>
            <div class="sidebar-actions">
              <button id="top5Button" type="button">Top 5</button>
              <button id="clearSelectionButton" type="button">Clear Selection</button>
            </div>
            <p id="selectionStatus" class="note">Selected athletes: 0</p>
            <div class="sidebar-pagination">
              <button id="tablePrevPage" type="button" class="sidebar-pagination-button">Prev</button>
              <span id="tablePageStatus" class="sidebar-pagination-status">Page 1 / 1</span>
              <button id="tableNextPage" type="button" class="sidebar-pagination-button">Next</button>
              <label for="tablePageSizeSelect" class="sidebar-pagination-label">Rows</label>
              <select id="tablePageSizeSelect" class="sidebar-pagination-size">
                <option value="10" selected>10</option>
                <option value="25">25</option>
                <option value="50">50</option>
              </select>
            </div>
            <div class="table-wrap mini-table-wrap">
              <table class="mini-table">
                <thead>
                  <tr>
                    <th>Sel</th>
                    <th>Ath</th>
                    <th>Evt</th>
                    <th>Perf</th>
                    <th>Vid</th>
                  </tr>
                </thead>
                <tbody id="athleteTableBody"></tbody>
              </table>
            </div>
          </div>
        </aside>
      </div>

      <footer>DNF overview is static and branch-preview friendly for PR feedback.</footer>
    </main>

    <script src="../../assets/js/dev-live-reload.js"></script>
    <script type="module" src="../../assets/js/dnf-overview.js"></script>
  </body>
</html>
