<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Apnea Signal Logo</title>
  <desc id="desc">Rounded blue gradient tile with a stylized wave-and-fin mark and Apnea Signal wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08345d"/>
      <stop offset="52%" stop-color="#1272b6"/>
      <stop offset="100%" stop-color="#7dd7f0"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dff6ff"/>
    </linearGradient>
  </defs>

  <rect x="48" y="48" width="928" height="928" rx="180" fill="url(#bg)"/>

  <g transform="translate(512 372)">
    <circle r="198" fill="#ffffff" fill-opacity="0.12"/>
    <circle r="186" fill="none" stroke="#ffffff" stroke-opacity="0.88" stroke-width="18"/>

    <path d="M -170 54 C -108 -6 -58 16 -14 54 C 22 84 58 82 96 58 C 128 38 154 34 176 44"
      fill="none" stroke="url(#wave)" stroke-width="42" stroke-linecap="round"/>

    <path d="M 68 -50 C 86 -114 146 -146 206 -126 C 186 -88 144 -52 88 -40 Z"
      fill="#ffffff" fill-opacity="0.95"/>

    <circle cx="-118" cy="-112" r="14" fill="#ffffff" fill-opacity="0.82"/>
    <circle cx="-84" cy="-148" r="9" fill="#ffffff" fill-opacity="0.68"/>
    <circle cx="-58" cy="-176" r="6" fill="#ffffff" fill-opacity="0.56"/>
  </g>

  <g text-anchor="middle" fill="#ffffff">
    <text x="512" y="700" font-family="Sora, Space Grotesk, Avenir Next, Segoe UI, sans-serif" font-size="116" font-weight="700" letter-spacing="6">APNEA SIGNAL</text>
    <text x="512" y="770" font-family="Space Grotesk, Avenir Next, Segoe UI, sans-serif" font-size="36" font-weight="600" letter-spacing="8" fill-opacity="0.84">FREEDIVING ANALYSIS</text>
  </g>
</svg>
